<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeSpace - Share a Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">SafeSpace</a>
  </div>
</nav>

<div class="container mt-5 mb-5">
  <h2 class="text-center mb-4">Share Your Thoughts Anonymously</h2>

  <form>
    <div class="mb-3">
      <label for="topic" class="form-label">Topic</label>
      <select id="topic" class="form-select">
        <option>Academic Stress</option>
        <option>Homesickness</option>
        <option>Depression</option>
        <option>Anxiety</option>
        <option>Relationships</option>
        <option>Motivation</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">Your Message</label>
      <textarea id="content" class="form-control" rows="5" placeholder="Write here..."></textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100">Post Anonymously</button>
  </form>
</div>

<footer>
  <p>© 2025 SafeSpace</p>
</footer>
</body>
</html>
